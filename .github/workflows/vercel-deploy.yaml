# deploy 브랜치 push 시 Vercel 프로덕션 배포.
# 🔑 필수 Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: 🚀 Deploy to Vercel

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: [deploy]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 22.x 고정: jsdom 의존(html-encoding-sniffer→@exodus/bytes ESM)이 require(ESM)을 써서
      # Node 22.12+ 필요 — 런타임(engines)과 빌드 환경을 일치시킨다.
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: ☁️ Install Vercel CLI
        run: pnpm add -g vercel@latest

      # Vercel이 원격 대신 CI에서 빌드하도록 prebuilt 플로우 사용(로컬 pnpm build 중복 제거)
      - name: ⬇️ Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🔨 Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel Production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: 📋 Deployment Summary
        if: always()
        run: |
          {
            echo "## 🚀 church-frontend 배포 결과"
            echo ""
            if [ "${{ job.status }}" == "success" ]; then
              echo "✅ **배포 성공**"
              echo "- 🌐 **URL**: ${{ steps.deploy.outputs.deployment_url }}"
            else
              echo "❌ **빌드 또는 배포 실패**"
              echo "- 커밋: \`${{ github.sha }}\`"
              echo "- Actions 탭에서 'Build' 스텝 로그를 확인하세요."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

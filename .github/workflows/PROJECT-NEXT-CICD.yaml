# ===================================================================
# Next.js CI/CD 배포
# ===================================================================
#
# deploy 브랜치 푸시 시 Docker 이미지를 빌드하고 배포합니다.
# SSR 지원을 위해 Node.js 런타임 컨테이너로 배포됩니다.
#
# ===================================================================
# 🔑 필수 GitHub Secrets
# ===================================================================
# ENV_FILE: .env 파일 내용
# DOCKERHUB_USERNAME: DockerHub 사용자명
# DOCKERHUB_TOKEN: DockerHub 액세스 토큰
# SERVER_HOST: 배포 서버 주소
# SERVER_USER: SSH 사용자명
# SERVER_PASSWORD: SSH 비밀번호
# PROJECT_DEPLOY_PORT (선택): 배포 포트 (기본: 3000)
# ===================================================================

name: PROJECT-NEXT-CICD

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

env:
  PROJECT_NAME: "project"
  DOCKER_IMAGE_PREFIX: "nextjs-container"
  NODE_VERSION: "20.15.0"
  ENV_FILE_NAME: ".env"

jobs:
  build:
    name: Next.js 애플리케이션 빌드
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      # 2. Node.js 개발 환경 설정
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # 3. 환경변수 파일 생성
      - name: 환경변수 파일 생성 (${{ env.ENV_FILE_NAME }})
        run: |
          cat << 'EOF' > ./${{ env.ENV_FILE_NAME }}
          ${{ secrets.ENV_FILE || secrets.ENV }}
          EOF
          echo "✅ ${{ env.ENV_FILE_NAME }} 파일 생성 완료"

      # 4. npm 의존성 캐싱
      - name: npm 의존성 캐싱
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # 5. node_modules 캐싱
      - name: node_modules 캐싱
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      # 6. 의존성 설치
      - name: 의존성 설치
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      # 7. Next.js 빌드 캐싱 (.next/cache)
      - name: Next.js 빌드 캐싱
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      # 8. 프로젝트 빌드 (SSR/SSG)
      - name: Build with npm
        run: npm run build

      # 9. Docker 빌드 환경 설정
      - name: Docker 빌드환경 설정
        uses: docker/setup-buildx-action@v3

      # 10. DockerHub 로그인
      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 11. Docker 레이어 캐싱
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 12. Docker 이미지 빌드 및 푸시
      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}-${{ env.DOCKER_IMAGE_PREFIX }}:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 13. Docker 캐시 정리
      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: 원격 서버 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 2022
          script: |
            set -e

            # ============================================================
            # 배포 환경 변수 설정
            # ============================================================
            echo "🔧 환경변수 설정.."
            export PATH=$PATH:/usr/local/bin
            export PW=${{ secrets.SERVER_PASSWORD }}

            BRANCH=${{ github.ref_name }}
            PROJECT_NAME="${{ env.PROJECT_NAME }}"

            # ============================================================
            # 브랜치별 포트 및 컨테이너명 설정
            # ============================================================
            PORT=3000
            CONTAINER_NAME="${PROJECT_NAME}-nextjs"

            if [ "$BRANCH" == "deploy" ] || [ "$BRANCH" == "main" ]; then
              PORT=${{ secrets.PROJECT_DEPLOY_PORT || '3000' }}
              CONTAINER_NAME="${PROJECT_NAME}-nextjs-deploy"
              echo "🚀 배포 환경으로 배포합니다 (브랜치: $BRANCH)"
            else
              echo "⚠️ 지원하지 않는 브랜치입니다: $BRANCH"
              exit 1
            fi

            echo "📋 배포 설정 정보:"
            echo "  - 브랜치: $BRANCH"
            echo "  - 프로젝트: $PROJECT_NAME"
            echo "  - 컨테이너 이름: $CONTAINER_NAME"
            echo "  - 포트: $PORT"
            echo "  - Docker 이미지: ${{ secrets.DOCKERHUB_USERNAME }}/${PROJECT_NAME}-${{ env.DOCKER_IMAGE_PREFIX }}:${BRANCH}"

            # ============================================================
            # Docker 이미지 풀 (Pull)
            # ============================================================
            echo "⬇️ Docker 이미지 풀..."
            echo $PW | sudo -S docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${PROJECT_NAME}-${{ env.DOCKER_IMAGE_PREFIX }}:${BRANCH}

            # ============================================================
            # 기존 컨테이너 정리
            # ============================================================
            echo "🧹 컨테이너 $CONTAINER_NAME 존재 여부 확인 중..."

            if sudo docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              echo "⚠️ 컨테이너 $CONTAINER_NAME 이(가) 존재합니다. 중지 및 삭제 중..."
              echo $PW | sudo -S docker rm -f $CONTAINER_NAME
              echo "✅ 컨테이너 $CONTAINER_NAME 이(가) 삭제되었습니다."
            else
              echo "ℹ️ 존재하는 컨테이너 $CONTAINER_NAME 이(가) 없습니다."
            fi

            # ============================================================
            # 새 컨테이너 실행
            # ============================================================
            echo "🚀 새로운 컨테이너 $CONTAINER_NAME 실행 중..."

            # Next.js는 SSR을 위해 Node.js 서버가 필요합니다
            # standalone 모드 사용 시 node server.js로 실행
            echo $PW | sudo -S docker run -d \
              -p ${PORT}:3000 \
              --name $CONTAINER_NAME \
              -e TZ=Asia/Seoul \
              -e NODE_ENV=production \
              -v /etc/localtime:/etc/localtime:ro \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/${PROJECT_NAME}-${{ env.DOCKER_IMAGE_PREFIX }}:${BRANCH}

            # ============================================================
            # 배포 완료 확인
            # ============================================================
            echo "✅ 배포가 성공적으로 완료되었습니다!"
            echo ""
            echo "📋 배포 결과 요약:"
            echo "  🎯 프로젝트: $PROJECT_NAME"
            echo "  🌿 브랜치: $BRANCH"
            echo "  🐳 컨테이너: $CONTAINER_NAME"
            echo "  🌐 포트: $PORT"
            echo "  ⏰ 배포 시간: $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "🔗 접속 URL: http://${{ secrets.SERVER_HOST }}:${PORT}"

# ===================================================================
# Next.js Dockerfile 예시 (standalone 모드)
# ===================================================================
#
# # Stage 1: Dependencies
# FROM node:20-alpine AS deps
# WORKDIR /app
# COPY package*.json ./
# RUN npm ci --only=production
#
# # Stage 2: Builder
# FROM node:20-alpine AS builder
# WORKDIR /app
# COPY --from=deps /app/node_modules ./node_modules
# COPY . .
# RUN npm run build
#
# # Stage 3: Runner
# FROM node:20-alpine AS runner
# WORKDIR /app
# ENV NODE_ENV production
#
# RUN addgroup --system --gid 1001 nodejs
# RUN adduser --system --uid 1001 nextjs
#
# COPY --from=builder /app/public ./public
# COPY --from=builder --chown=nextjs:nodejs /app/.next/standalone ./
# COPY --from=builder --chown=nextjs:nodejs /app/.next/static ./.next/static
#
# USER nextjs
# EXPOSE 3000
# ENV PORT 3000
# CMD ["node", "server.js"]
#
# ===================================================================
# next.config.js에 standalone 설정 추가:
# module.exports = {
#   output: 'standalone',
# }
# ===================================================================
